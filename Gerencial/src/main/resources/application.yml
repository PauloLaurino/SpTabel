server:
  port: 8080
  servlet:
    context-path: /gerencial
    application-display-name: Gerencial NFS-e

spring:
  application:
    name: gerencial-nfse
  
  # Perfil padrão
  profiles:
    active: ${SPRING_PROFILE:dev}
  
  # Configuração do Banco de Dados MariaDB
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:sptabel}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:k15720}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: MariaDB-HikariCP
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 60000
  
  # Configuração JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false
  
  # Configuração de Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  
  # Configuração de logs
  output:
    ansi:
      enabled: always

# Configuração JWT
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJwtTokenGenerationAndValidation2024}
  expiration: 86400000  # 24 horas em milliseconds

# Configuração NFS-e
nfse:
  nacional:
    municipio-default: PATO_BRANCO
    ambiente: 2  # 1=produção, 2=homologação
    timeout: 60000  # 60 segundos
    retry:
      max-attempts: 3
      initial-interval: 1000
      multiplier: 2

# Configuração Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Logging
logging:
  level:
    root: INFO
    com.seprocom.gerencial: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/gerencial-nfse.log
    max-size: 10MB
    max-history: 30