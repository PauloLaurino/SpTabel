# ==============================================
# CONFIGURAÇÃO DE LOGGING - SISTEMA SELADOR
# ==============================================

# NÍVEL DE LOG GLOBAL
.level = INFO

# CONFIGURAÇÃO DO HANDLER
handlers = java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# FORMATO DO LOG
java.util.logging.SimpleFormatter.format = [%1$tF %1$tT] [%4$-7s] %5$s %n

# ==============================================
# CONSOLE HANDLER (desenvolvimento)
# ==============================================
java.util.logging.ConsoleHandler.level = INFO
java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.ConsoleHandler.encoding = UTF-8

# ==============================================
# FILE HANDLER (produção)
# ==============================================
java.util.logging.FileHandler.level = INFO
java.util.logging.FileHandler.pattern = logs/selador.%u.%g.log
java.util.logging.FileHandler.limit = 10485760  # 10MB
java.util.logging.FileHandler.count = 10
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter
java.util.logging.FileHandler.append = true
java.util.logging.FileHandler.encoding = UTF-8

# ==============================================
# LOGS ESPECÍFICOS POR PACOTE
# ==============================================

# APLICAÇÃO PRINCIPAL
com.selador.Main.level = INFO

# CAMADA WEB (Servlets/Filters)
com.selador.web.level = INFO
com.selador.web.servlets.level = INFO
com.selador.web.filters.level = INFO

# CAMADA DE SERVIÇO
com.selador.service.level = INFO
com.selador.service.ApontamentoService.level = INFO
com.selador.service.SeloService.level = INFO
com.selador.service.SelagemService.level = INFO

# CAMADA DE DADOS
com.selador.dao.level = INFO
com.selador.dao.ApontamentoDAO.level = INFO
com.selador.dao.SeloDAO.level = INFO
com.selador.dao.SeladoDAO.level = INFO

# CONEXÃO COM BANCO
com.selador.dao.ConnectionFactory.level = INFO
com.zaxxer.hikari.level = WARNING

# UTILITÁRIOS
com.selador.util.level = INFO
com.selador.util.DateUtil.level = INFO
com.selador.util.JsonUtil.level = INFO

# ==============================================
# LOGS DETALHADOS PARA DEBUG
# ==============================================
# Para habilitar debug, altere para:
# com.selador.level = DEBUG
# java.util.logging.ConsoleHandler.level = DEBUG

# LOG DE SQL (cuidado: gera muito output)
# com.selador.dao.level = FINE

# ==============================================
# CONFIGURAÇÕES ADICIONAIS
# ==============================================

# Tamanho máximo do arquivo de log (10MB)
java.util.logging.FileHandler.limit = 10485760

# Número máximo de arquivos de log
java.util.logging.FileHandler.count = 10

# Padrão de rotação
# %u - número único para evitar conflitos
# %g - número de geração (rotação)
java.util.logging.FileHandler.pattern = logs/selador.%u.%g.log

# Manter logs antigos por 30 dias
# (Implementar limpeza externa)

# ==============================================
# LOGS DE PERFORMANCE
# ==============================================
com.selador.performance.level = INFO

# Monitorar tempo de resposta
performance.monitoring.enabled = true
performance.slow.threshold.ms = 5000

# Log de queries lentas
db.slow.query.threshold.ms = 3000