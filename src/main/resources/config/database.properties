# ==============================================
# CONFIGURAÇÃO DO BANCO DE DADOS - MariaDB 10.5
# ==============================================

# CONEXÃO PRINCIPAL (sptabel)
db.driver=org.mariadb.jdbc.Driver
db.url=jdbc:mariadb://localhost:3306/sptabel
db.username=root
db.password=k15720

# CONEXÃO ALTERNATIVA (fallback)
# db.alternative.url=jdbc:mysql://backup-server:3306/spprot
# db.alternative.username=backup_user
# db.alternative.password=backup_pass

# CONFIGURAÇÕES DO POOL DE CONEXÕES (HikariCP)
db.pool.name=SeladorPool
db.pool.max.size=10
db.pool.min.idle=5
db.pool.connection.timeout=30000
db.pool.idle.timeout=600000
db.pool.max.lifetime=1800000
db.pool.validation.timeout=5000
db.pool.leak.detection.threshold=60000

# CONFIGURAÇÕES DE PERFORMANCE
db.pool.cache.prepared.stmts=true
db.pool.prepared.stmt.cache.size=250
db.pool.prepared.stmt.cache.sql.limit=2048

# CONFIGURAÇÕES DE RECONEXÃO
db.reconnect.attempts=3
db.reconnect.delay=5000
db.reconnect.test.query=SELECT 1

# CONFIGURAÇÕES DE TRANSACTION
db.transaction.isolation=TRANSACTION_READ_COMMITTED
db.auto.commit=false
db.default.schema=sptabel

# CONFIGURAÇÕES DE LOGGING SQL (apenas desenvolvimento)
db.logging.enabled=false
db.logging.level=INFO
db.logging.slow.query.threshold=5000

# CONFIGURAÇÕES DE ENCODING
db.encoding=UTF-8
db.timezone=America/Sao_Paulo