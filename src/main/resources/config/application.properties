# ==============================================
# APLICAÇÃO SELADOR - CONFIGURAÇÃO PRINCIPAL
# ==============================================

# AMBIENTE
app.environment=production
app.name=Sistema Selador
app.version=1.0.0
app.description=Sistema de selagem automática para apontamentos

# SERVIDOR
server.port=5000
server.context-path=/selador
server.session.timeout=1800

# INTEGRAÇÃO MAKER 5
maker.integration.enabled=true
maker.base.url=http://localhost:5000/webrun5
maker.api.timeout=30000

# SELOS
selo.tipo.padrao=0004
selo.codigo.tipo.ato=701
selo.quantidade.minima=10
selo.alerta.quantidade=20

# VALIDAÇÕES
validation.max.apontamentos.lote=100
validation.data.max.dias=365
validation.retry.attempts=3

# CACHE
cache.enabled=true
cache.duration.minutes=30
cache.max.size=1000

# ==============================================
# CONFIGURAÇÕES DE PERFORMANCE
# ==============================================
performance.query.timeout=30
performance.connection.pool.size=10
performance.max.threads=50
performance.queue.size=1000

# ==============================================
# CONFIGURAÇÕES DE SEGURANÇA
# ==============================================
security.cors.enabled=true
security.cors.allowed-origins=*
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.allowed-headers=*
security.cors.allow-credentials=true

security.auth.enabled=false
security.auth.token.header=X-API-Key
security.auth.token.required=false

# ==============================================
# CONFIGURAÇÕES DE NOTIFICAÇÃO
# ==============================================
notification.enabled=false
notification.email.host=smtp.gmail.com
notification.email.port=587
notification.email.username=
notification.email.password=
notification.email.from=selador@empresa.com

# ==============================================
# CONFIGURAÇÕES DE MANUTENÇÃO
# ==============================================
maintenance.mode.enabled=false
maintenance.backup.enabled=true
maintenance.backup.cron=0 2 * * *
maintenance.cleanup.days=30