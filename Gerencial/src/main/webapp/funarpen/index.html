<body>
  <div id="app"></div>
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const ambientePar = urlParams.get('ambiente_par');
      const contextoPar = urlParams.get('contexto_par');
      if (!ambientePar && !contextoPar) {
        const redirectCount = parseInt(sessionStorage.getItem('funarpen-redirect-count') || '0');
        if (redirectCount < 1) {
          sessionStorage.setItem('funarpen-redirect-count', '1');
          window.location.href = '/funarpen/monitor';
          return;
        }
      } else { sessionStorage.removeItem('funarpen-redirect-count'); }
    })();

    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const contextoPar = urlParams.get('contexto_par') || '/STP';
      const ctxPath = contextoPar.startsWith('/') ? contextoPar : '/' + contextoPar;
      const origin = window.location.origin;
      const reactUrl = origin + ctxPath + '/components/react/react.production.min.js';
      const reactDomUrl = origin + ctxPath + '/components/react/react-dom.production.min.js';
      
      const reactScript = document.createElement('script');
      reactScript.src = reactUrl;
      reactScript.onload = function() {
        const reactDomScript = document.createElement('script');
        reactDomScript.src = reactDomUrl;
        reactDomScript.onload = function() {
          const headerScript = document.createElement('script');
          headerScript.src = './components/header/app-header.js';
          document.head.appendChild(headerScript);
        };
        document.head.appendChild(reactDomScript);
      };
      document.head.appendChild(reactScript);
    })();
  </script>
  <script src="frame-bridge-child-snippet.js"></script>
  <script>
    let _parametrosCache = null;
    function lerParametros() {
      if (_parametrosCache) return Promise.resolve(_parametrosCache);
      const urlParams = new URLSearchParams(window.location.search);
      const ambientePar = urlParams.get('ambiente_par');
      const contextoPar = urlParams.get('contexto_par');
      if (ambientePar || contextoPar) {
        _parametrosCache = { ambiente_par: ambientePar, contexto_par: contextoPar };
        return Promise.resolve(_parametrosCache);
      }
      return Promise.resolve(null);
    }

    function ctxCandidates() {
      return lerParametros().then(params => {
        const candidates = [];
        const pathParts = window.location.pathname.split('/').filter(Boolean);
        const ctxCurrent = pathParts.length ? '/' + pathParts[0] : '';
        if (params && params.contexto_par) {
          if (params.contexto_par !== ctxCurrent) candidates.push(params.contexto_par);
        }
        if (ctxCurrent) candidates.push(ctxCurrent);
        ['/STP', '/webrun5', '/funarpen', ''].forEach(c => { if (!candidates.includes(c)) candidates.push(c); });
        return candidates;
      });
    }
    window.ctxCandidates = ctxCandidates;

    function tryFetchJson(path) {
      return ctxCandidates().then(candidates => {
        return new Promise((resolve, reject) => {
          let i = 0;
          function attempt() {
            if (i >= candidates.length) return reject(new Error('all failed'));
            const c = candidates[i++];
            const url = (c ? window.location.origin + c.replace(/\/$/, '') : '') + path;
            fetch(url, { credentials: 'same-origin' })
              .then(r => r.ok ? r.json() : Promise.reject(r.status))
              .then(json => resolve({ json, candidate: c }))
              .catch(() => attempt());
          }
          attempt();
        });
      });
    }
  </script>
  <script>
    function MonitorSelosFunarpen() {
      const { useState, useEffect, useMemo, useRef } = window.React || {};
      const [codigoOficio, setCodigoOficio] = useState("");
      const [naturezas, setNaturezas] = useState("");
      const [usuarioParam, setUsuarioParam] = useState("");
      const [pedidoField, setPedidoField] = useState("");
      const [logs, setLogs] = useState([]);
      const [selos, setSelos] = useState([]);
      const [estoque, setEstoque] = useState([]);
      const [msg, setMsg] = useState("");
      const [errorModal, setErrorModal] = useState(null);
      const apiBaseRef = useRef(null);

      useEffect(() => {
        tryFetchJson('/funarpen/maker/api/parametros').then(({ json, candidate }) => {
          if (candidate) apiBaseRef.current = candidate;
          if (json.CODTABEL_PAR) setCodigoOficio(String(json.CODTABEL_PAR));
          if (json.SELOS_PAR?.naturezas) setNaturezas(String(json.SELOS_PAR.naturezas));
          if (json.USUARIO_PAR) setUsuarioParam(String(json.USUARIO_PAR));
        }).finally(() => carregarMonitor());
      }, []);

      function carregarMonitor() {
        tryFetchJson('/funarpen/maker/api/funarpen/selos/monitor?limit=10').then(({ json }) => {
          setLogs(json.logs || []);
          setSelos(json.selos || []);
          setEstoque(json.estoque || []);
        });
      }

      function renderRow(l) {
        return React.createElement('tr', { key: l.ID_LOG },
          React.createElement('td', null, l.ID_LOG),
          React.createElement('td', null, l.pedidoId || '-'),
          React.createElement('td', null, l.data || '-'),
          React.createElement('td', null, l.tipo || '-'),
          React.createElement('td', null, l.qtde || 0),
          React.createElement('td', null, React.createElement('span', { className: 'status-badge ' + (l.status === 'ERRO' ? 'status-error' : 'status-ok') }, l.status || 'OK')),
          React.createElement('td', null, React.createElement('button', { className: 'btn-pro btn-pro-outline', style: { padding: '6px 12px' } }, 'Ações'))
        );
      }
      return React.createElement('div', { id: 'app' },
        // HEADER
        React.createElement('div', { className: 'header-pro' },
          React.createElement('div', null,
            React.createElement('h1', null, 'Monitor FUNARPEN'),
            React.createElement('span', { className: 'badge-env' }, 'Ambiente de Operação')
          ),
          React.createElement('div', null, React.createElement('span', null, 'Usuário: ' + usuarioParam))
        ),

        // MAIN GRID
        React.createElement('div', { className: 'view-grid' },
          // LEFT: FORM
          React.createElement('div', { className: 'glass-card content-box' },
            React.createElement('div', { dangerouslySetInnerHTML: { __html: `            <div class="glass-card" style="margin-bottom:20px; padding:15px;">
              <h3 style="font-family:Outfit; font-size:14px; margin-bottom:10px; color:var(--primary);">ESTOQUE DE SELOS</h3>
              <canvas id="estoqueChart" style="max-height:180px;"></canvas>
            </div>` } }),React.createElement('div', { className: 'box-head' }, React.createElement('h3', null, 'Configurações de Importação')),
            React.createElement('div', { className: 'box-body' },
              React.createElement('div', { className: 'pro-input-group' },
                React.createElement('label', { className: 'pro-label' }, 'Código do Ofício'),
                React.createElement('input', { className: 'pro-input', value: codigoOficio, readOnly: true })
              ),
              React.createElement('div', { className: 'pro-input-group' },
                React.createElement('label', { className: 'pro-label' }, 'Naturezas'),
                React.createElement('input', { className: 'pro-input', value: naturezas, readOnly: true })
              ),
              React.createElement('button', { className: 'btn-pro btn-pro-primary', style: { width: '100%' } }, 'Sincronizar Selos AGORA')
            )
          ),

          // RIGHT: DATA
          React.createElement('div', { className: 'glass-card content-box' },
            React.createElement('div', { className: 'box-head' }, React.createElement('h3', null, 'Últimos Pedidos Processados')),
            React.createElement('div', { className: 'box-body' },
              React.createElement('div', { className: 'data-table-wrapper' },
                React.createElement('table', null,
                  React.createElement('thead', null,
                    React.createElement('tr', null,
                      React.createElement('th', null, 'ID'), React.createElement('th', null, 'Pedido'), React.createElement('th', null, 'Data'), React.createElement('th', null, 'Tipo'), React.createElement('th', null, 'Qtd'), React.createElement('th', null, 'Status'), React.createElement('th', null, '')
                    )
                  ),
                  React.createElement('tbody', null,
                    logs.length > 0 ? logs.map(l => renderRow(l)) : React.createElement('tr', null, React.createElement('td', { colSpan: 7, style: { textAlign: 'center', padding: '40px' } }, 'Nenhum log disponível'))
                  )
                )
              )
            )
          )
        )
      );
    }
    window.MonitorSelosFunarpen = MonitorSelosFunarpen;
  </script>
  <script>
    (function() {
      function attemptRender() {
        if (typeof window.React === 'undefined' || typeof window.ReactDOM === 'undefined') {
          setTimeout(attemptRender, 100);
          return;
        }
        const appEl = document.getElementById('app');
        if (appEl) {
          window.ReactDOM.render(window.React.createElement(window.MonitorSelosFunarpen), appEl);
        }
      }
      setTimeout(attemptRender, 300);
    })();
