    <script>
      // 1. REDIRECT SE NÃO TEM PARÂMETROS NA URL
      (function() {
        const logPrefix = "[FunarpenHTML @ " + new Date().toISOString() + "]";
        console.log(logPrefix + " ================== INICIALIZANDO ==================");
        
        const urlParams = new URLSearchParams(window.location.search);
        // Captura o sistema (contexto) da URL atual
        window.currentSys = urlParams.get('sys');
        
        const ambientePar = urlParams.get("ambiente_par");
        const contextoPar = urlParams.get("contexto_par");
        
        if (!ambientePar && !contextoPar) {
          const redirectCount = parseInt(sessionStorage.getItem("funarpen-redirect-count") || "0");
          if (redirectCount < 1) {
            console.log(logPrefix + " [1ª tentativa] Redirecionando para servlet...");
            sessionStorage.setItem("funarpen-redirect-count", "1");
            window.location.href = "/gerencial/html/monitor_selos_funarpen.html?ambiente_par=STP&contexto_par=/gerencial";
            return;
          } else {
            console.warn(logPrefix + " [Fallback] Servlet não retornou parâmetros. Usando padrões.");
            sessionStorage.removeItem("funarpen-redirect-count");
          }
        } else {
          sessionStorage.removeItem("funarpen-redirect-count");
        }
      })();

      // 2. INJETAR REACT DINAMICAMENTE
      (function() {
        const logPrefix = "[ReactLoader @ " + new Date().toISOString() + "]";
        const urlParams = new URLSearchParams(window.location.search);
        
        const pathParts = window.location.pathname.split("/").filter(Boolean);
        const defaultCtx = pathParts.length > 0 ? "/" + pathParts[0] : "/webrun";
        const ctxPath = urlParams.get("contexto_par") || defaultCtx;
        
        const origin = window.location.origin;
        const reactUrl = origin + (ctxPath.endsWith("/") ? ctxPath : ctxPath + "/") + "components/react/react.production.min.js";
        const reactDomUrl = origin + (ctxPath.endsWith("/") ? ctxPath : ctxPath + "/") + "components/react/react-dom.production.min.js";
        
        console.log(logPrefix + " Carregando React de: " + reactUrl);
        
        const reactScript = document.createElement("script");
        reactScript.src = reactUrl;
        reactScript.onload = function() {
          const reactDomScript = document.createElement("script");
          reactDomScript.src = reactDomUrl;
          reactDomScript.onload = function() {
            console.log(logPrefix + " ✅ React/ReactDOM carregados");
            const headerScript = document.createElement("script");
            headerScript.src = "./components/header/app-header.js";
            document.head.appendChild(headerScript);
          };
          document.head.appendChild(reactDomScript);
        };
        document.head.appendChild(reactScript);
      })();

      // 3. RENDERIZAR APP
      (function() {
        const logPrefix = "[AppRenderer @ " + new Date().toISOString() + "]";
        
        function attemptRender() {
          if (typeof window.React === "undefined" || typeof window.ReactDOM === "undefined" || typeof window.MonitorSelosFunarpen === "undefined") {
            const h = document.getElementById("funarpen-header-check");
            if (h) h.textContent = "Aguardando scripts...";
            setTimeout(attemptRender, 100);
            return;
          }
          
          var appEl = document.getElementById("app");
          if (!appEl) return;
          
          try {
            console.log(logPrefix + " Renderizando MonitorSelosFunarpen...");
            window.ReactDOM.render(window.React.createElement(window.MonitorSelosFunarpen), appEl);
            console.log(logPrefix + " ✅ App renderizado com sucesso!");
          } catch(e) {
            console.error(logPrefix + " ❌ Erro ao renderizar:", e);
            appEl.innerHTML = "<div class=\"fallback-box\"><h2>Erro ao Renderizar</h2><p>Erro: " + (e.message || e) + "</p></div>";
          }
        }
        setTimeout(attemptRender, 300);
      })();
    </script>

    <script>
      // auto-resize: envia altura do conteúdo para o pai via postMessage
      (function(){
        function sendHeight(){
          try{
            var h = Math.max(document.documentElement.scrollHeight, document.body.scrollHeight);
            try { var fh = document.getElementById('funarpen-footer-height'); if (fh) fh.textContent = 'Altura do conteúdo: ' + h + ' px'; } catch(e){}
            parent.postMessage({ type: 'funarpen-height', h: h, id: window.location.href }, '*');
          }catch(e){}
        }
        window.addEventListener('load', function(){ sendHeight(); setTimeout(sendHeight, 500); });
        if (window.ResizeObserver) {
          try { new ResizeObserver(sendHeight).observe(document.documentElement); } catch(e){}
        }
        // fallback interval
        setInterval(sendHeight, 2000);
      })();

      // Nota: useState e outros hooks são destructurizados DENTRO de MonitorSelosFunarpen
      // para garantir que React já está carregado quando a função é chamada

      // Cache para parâmetros lidos do banco
      let _parametrosCache = null;
      let _parametrosPromise = null;

      function normalizeNaturezasValue(value) {
        if (value == null) return '';

        let v = value;
        if (typeof v === 'string') {
          const trimmed = v.trim();
          if (!trimmed) return '';

          // Formato legado comum: "naturezas=[tp,tn,ah]", "naturezas:[tp,tn]"
          // e fragmentos como '"naturezas": [ "tp"],'
          try {
            const matchLegacy = trimmed.match(/['\"]?naturezas['\"]?\s*[:=]\s*\[([^\]]+)\]\s*,?/i);
            if (matchLegacy && matchLegacy[1]) {
              return matchLegacy[1]
                .split(',')
                .map(s => String(s || '').replace(/["'\[\]]/g, '').trim())
                .filter(Boolean)
                .join(',');
            }
          } catch (e) {}

          // Formato de array sem JSON estrito: [tp,tn,ah]
          if (trimmed.startsWith('[') && trimmed.endsWith(']') && trimmed.indexOf('"') === -1 && trimmed.indexOf("'") === -1) {
            return trimmed
              .slice(1, -1)
              .split(',')
              .map(s => String(s || '').trim())
              .filter(Boolean)
              .join(',');
          }

          try {
            if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
              v = JSON.parse(trimmed);
            } else {
              return trimmed;
            }
          } catch (e) {
            return trimmed;
          }
        }

        if (Array.isArray(v)) {
          return v.map(x => String(x).trim()).filter(Boolean).join(',');
        }

        if (typeof v === 'object') {
          const candidate = v.naturezas || v.NATUREZAS || v.par || v.PAR || v.valor || v.VALUE;
          if (candidate != null && candidate !== v) {
            return normalizeNaturezasValue(candidate);
          }
        }

        return String(v || '').trim();
      }

      function extractNaturezasFromPayload(payload) {
        if (!payload || typeof payload !== 'object') return '';

        const roots = [
          payload,
          payload.parametros,
          payload.PARAMETROS,
          payload.sLista,
          payload.data
        ].filter(Boolean);

        for (const root of roots) {
          const se = root.SELOS_PAR || root.selos_par || root.SelosPar || root.SELOS || root.selos;
          const naturezasPar = root.NATUREZAS_PAR || root.naturezas_par || root.NaturezasPar;
          const direct = root.naturezas || root.NATUREZAS;

          const fromNaturezasPar = normalizeNaturezasValue(naturezasPar);
          if (fromNaturezasPar) return fromNaturezasPar;

          const fromSe = normalizeNaturezasValue(se);
          if (fromSe) return fromSe;

          const fromDirect = normalizeNaturezasValue(direct);
          if (fromDirect) return fromDirect;
        }

        return '';
      }

      function lerParametros() {
        // Retorna Promise que resolve com os parâmetros do banco
        if (_parametrosCache) return Promise.resolve(_parametrosCache);
        
        // Tenta ler de URL params (injetados pelo servidor) PRIMEIRO
        const urlParams = new URLSearchParams(window.location.search);
        const ambientePar = urlParams.get('ambiente_par');
        const contextoPar = urlParams.get('contexto_par');
        
        if (ambientePar || contextoPar) {
          // Parâmetros vieram na URL - use como está
          _parametrosCache = { ambiente_par: ambientePar, contexto_par: contextoPar };
          return Promise.resolve(_parametrosCache);
        }
        
        // Fallback: retorna null se não tiver params na URL
        // (O ctxCandidates() vai usar valores padrão)
        return Promise.resolve(null);
      }

      function ctxCandidates() {
        // Sem async/await aqui, retorna promise que resolve com os contextos
        return lerParametros().then(params => {
          const candidates = [];
          const pathParts = window.location.pathname.split('/').filter(Boolean);
          
          // Detectar o contexto atual do pathname (primeira parte não-vazia)
          // Ex: /STP/funarpen/html... -> ctxCurrent = '/STP'
          const ctxCurrent = pathParts.length ? '/' + pathParts[0] : '';

          // Preferência 1: contexto_par do banco se diferente do atual
          if (params && params.contexto_par) {
            const ctx = params.contexto_par;
            if (ctx && ctx !== ctxCurrent && !candidates.includes(ctx)) {
              candidates.push(ctx);
            }
          }

          // Preferência 2: contexto detectado do pathname
          if (ctxCurrent && !candidates.includes(ctxCurrent)) {
            candidates.push(ctxCurrent);
          }

          // Fallbacks: STP (produção) + webrun5 (desenvolvimento) + funarpen (contexto) + raiz
          // (Evita duplicação)
          ['/STP', '/webrun5', '/funarpen', ''].forEach(c => { 
            if (!candidates.includes(c)) candidates.push(c); 
          });

          return candidates;
        });
      }

      // Exportar ctxCandidates para window global (necessário para importarSelos)
      window.ctxCandidates = ctxCandidates;

      function tryFetchJson(path) {
        // debug helper: cria banner de debug leve no canto inferior esquerdo
        try {
          if (!window.funarpenDebug) {
            window.funarpenDebug = function(txt){
              try {
                var d = document.getElementById('funarpen-debug');
                if (!d) {
                  d = document.createElement('div'); d.id = 'funarpen-debug';
                  d.style.position = 'fixed'; d.style.left = '8px'; d.style.bottom = '8px'; d.style.zIndex = 200000; d.style.background = 'rgba(0,0,0,0.6)'; d.style.color = '#fff'; d.style.padding = '6px 10px'; d.style.borderRadius = '6px'; d.style.fontSize = '12px'; d.style.maxWidth = '60vw'; d.style.maxHeight = '40vh'; d.style.overflow = 'auto'; d.style.fontFamily='Segoe UI, Tahoma, sans-serif'; document.body.appendChild(d);
                }
                var now = (new Date()).toLocaleTimeString();
                d.textContent = now + ' - ' + txt;
              } catch(e){}
            };
          }
        } catch(e){}

        return ctxCandidates().then(candidates => {
          return new Promise((resolve, reject) => {
            let i = 0;
            function attempt() {
              if (i >= candidates.length) { window.funarpenDebug && window.funarpenDebug('ALL CANDIDATES FAILED for ' + path); return reject(new Error('all failed')); }
              const candidate = candidates[i++];

              // normaliza o candidate para formar a URL correta
              // se candidate for vazio -> path absoluto (ex: /maker/api/parametros)
              // se candidate começar com '/' -> candidate + path
              // também tenta com origin (útil se houver proxy/contexto)
              const tryUrls = [];
              if (!candidate) {
                tryUrls.push(path);
                tryUrls.push(window.location.origin + path);
              } else if (candidate.startsWith('/')) {
                tryUrls.push(candidate.replace(/\/$/, '') + path);
                tryUrls.push(window.location.origin + candidate.replace(/\/$/, '') + path);
              } else {
                tryUrls.push(candidate.replace(/\/$/, '') + path);
              }

              (function tryNextUrl(j){
                if (j >= tryUrls.length) { window.funarpenDebug && window.funarpenDebug('candidate exhausted: ' + candidate); attempt(); return; }
              const urlOrig = tryUrls[j];
              const url = window.currentSys ? (urlOrig + (urlOrig.indexOf('?') === -1 ? '?' : '&') + 'sys=' + window.currentSys) : urlOrig;
              
              window.funarpenDebug && window.funarpenDebug('trying ' + url);
                fetch(url, { credentials: 'same-origin' })
                  .then(r => {
                    if (!r.ok) { window.funarpenDebug && window.funarpenDebug('failed ' + url + ' status ' + r.status); throw new Error('status ' + r.status); }
                    return r.json();
                  })
                  .then(json => { window.funarpenDebug && window.funarpenDebug('ok ' + url + ' -> ' + path); resolve({ json, candidate }); })
                  .catch((err) => { window.funarpenDebug && window.funarpenDebug('err ' + url + ' -> ' + (err && err.message)); tryNextUrl(j+1); });
              })(0);
            }
            attempt();
          });
        });
      }

      function MonitorSelosFunarpen() {
        // Destructurizar hooks DENTRO da função para garantir React está disponível
        const { useState, useEffect, useMemo, useRef } = window.React || {};
        
        const [codigoOficio, setCodigoOficio] = useState("");
        const [naturezas, setNaturezas] = useState("");
        const [usuarioParam, setUsuarioParam] = useState("");
        const [pedidoField, setPedidoField] = useState("");
        const [minimized, setMinimized] = useState(false);
        const [logs, setLogs] = useState([]);
        const [selos, setSelos] = useState([]);
        const [estoque, setEstoque] = useState([]);
        const [tiposPedido, setTiposPedido] = useState(null); // quando um pedido for selecionado, conterá totais por tipo
        const [msg, setMsg] = useState("");
        const [selectedPedido, setSelectedPedido] = useState(null);
        const [errorModal, setErrorModal] = useState(null);
        const apiBaseRef = useRef(null);
        const [page, setPage] = useState(1);
        const [pageSize, setPageSize] = useState(10);

        const paged = useMemo(() => {
          const total = (logs && logs.length) ? logs.length : 0;
          const ps = pageSize || 10;
          const totalPages = Math.max(1, Math.ceil(total / ps));
          const current = Math.min(Math.max(1, page), totalPages);
          const start = (current - 1) * ps;
          const items = (logs || []).slice(start, start + ps);
          return { items, total, totalPages, current };
        }, [logs, page, pageSize]);

        useEffect(()=>{ setPage(1); }, [pageSize]);

        // Visual test mode: se URL contém ?visualTest=1, popula dados mock para teste visual
        const _visualTest = (function(){ try { const p = new URLSearchParams(window.location.search); return p.get('visualTest') === '1' || p.get('visualTest') === 'true'; } catch(e){ return false; } })();
        useEffect(()=>{
          if (!_visualTest) return;
          try {
            setCodigoOficio('181196');
            setUsuarioParam('tabelionatotibagi@uol.com.br');
            setNaturezas('tp,tn,ah');
            const mockSelos = [
              { ID_LOG: 1001, pedido_sel: 5001, tiposelo_sel: 'TP1', data_pedido: '2026-01-25', tipo_operacao: 'EMISSAO', qtde_carregada: 3, status: 'BAIXADO' },
              { ID_LOG: 1002, pedido_sel: 5002, tiposelo_sel: 'TP3', data_pedido: '2026-01-24', tipo_operacao: 'REEMISSAO', qtde_carregada: 1, status: 'ERRO' },
              { ID_LOG: 1003, pedido_sel: 5003, tiposelo_sel: 'TPD', data_pedido: '2026-01-23', tipo_operacao: 'EMISSAO', qtde_carregada: 2, status: 'BAIXADO' }
            ];
            setSelos(mockSelos);
            setLogs([ { ID_LOG: 1001, data: '2026-01-25', tipo: 'EMISSAO', qtde: 3, status: 'BAIXADO' }, { ID_LOG: 1002, data: '2026-01-24', tipo: 'REEMISSAO', qtde: 1, status: 'ERRO' } ]);
            setMsg('Visual Test Mode ativo');
            apiBaseRef.current = '';
          } catch(e){}
        }, []);

        useEffect(() => {
          // busca parametros para popular CódigoOficio, Naturezas e Usuário
            tryFetchJson('/gerencial/maker/api/parametros')
            .then(({ json, candidate }) => {
              if (candidate) apiBaseRef.current = candidate;
              const codigo = json && (json.CODTABEL_PAR || json.codtabel_par || json.codigoOficio || json.codigo_oficio);
              const nat = extractNaturezasFromPayload(json);
              console.log('[Parametros] JSON completo:', JSON.stringify(json).substring(0, 500));
              console.log('[Parametros] SELOS_PAR:', json && (json.SELOS_PAR || json.selos_par));
              console.log('[Parametros] naturezas encontradas:', nat);
              const usuario = json && (json.USUARIO_PAR || json.usuario_par || json.USUARIO || json.usuario);
              if (codigo) setCodigoOficio(String(codigo));
              if (nat) setNaturezas(String(nat));
              
              // Tentar obter usuário: 1) ebfGetUserLogin (nativa Maker), 2) USUARIO_PAR (banco)
              let usuarioFinal = null;
              try {
                if (typeof window.ebfGetUserLogin === 'function') {
                  const userLogin = window.ebfGetUserLogin();
                  if (userLogin) usuarioFinal = String(userLogin);
                }
              } catch(e) { console.warn('[Monitor] Erro ao chamar ebfGetUserLogin():', e); }
              
              // Fallback: usar USUARIO_PAR do banco se ebfGetUserLogin não retornou
              if (!usuarioFinal && usuario) {
                usuarioFinal = String(usuario);
              }
              
              if (usuarioFinal) setUsuarioParam(usuarioFinal);
            })
            .catch(() => {
              // fallback para sessão/sLista
              tryFetchJson('/gerencial/maker/api/session/info')
                .then(({ json, candidate }) => {
                  if (candidate) apiBaseRef.current = candidate;
                  if (json && json.sLista) {
                    const s = json.sLista;
                    const codigo = s.CODTABEL_PAR || s.codtabel_par || s.codigoOficio || s.codigo_oficio;
                    const nat = extractNaturezasFromPayload(s);
                    console.log('[Parametros-Fallback] SELOS_PAR:', s && (s.SELOS_PAR || s.selos_par));
                    console.log('[Parametros-Fallback] naturezas encontradas:', nat);

        function mapTipoLabel(raw) {
          try {

            const r = String(raw || '').toUpperCase();
            return codeToLabel[r] || r || 'OUTRO';
          } catch(e) { return raw || 'OUTRO'; }
        }

        const estoqueList = useMemo(() => {
          const codeToLabel = { '0003':'TPD','0007':'TN1','0002':'TN2','0008':'TN3','0005':'TNI','0006':'TN5', '0001':'TP1','0009':'TP3','0010':'TP4','0011':'TP5','0004':'TPI' };
          const map = {};
          (estoque || []).forEach(e => {
            const raw = String(e.tiposelo || e.tiposelo_sel || '').toUpperCase();
            const tp = codeToLabel[raw] || raw || 'OUTRO';
            map[tp] = { tipo: tp, disponivel: Number(e.disponivel || 0) };
          });
          // garantir ordem conhecida
          const order = ['TP1','TP3','TP4','TPD','TPI','TN1','TN2','TN3','TNI','AH','TP5'];

                    } catch(e){ console.debug('[mostrarPedido] erro ao calcular tiposPedido', e); setTiposPedido(null); }
                } else if (Array.isArray(json)) {
                  setSelos(json);
                  setTiposPedido(null);
                } else if (json.selos && Array.isArray(json.selos)) {
                  setSelos(json.selos);
                    try {
                      const mapa = {};
                      let totalCount = 0;
                      json.selos.forEach(function(s){
                        const raw = String(s.tiposelo_sel || s.tipo || s.tiposelo || '').toUpperCase() || '';
                        const tp = mapTipoLabel(raw);
                        const qty = Number(s.qtde_carregada || s.qtde || s.qtd || 1) || 0;
                        totalCount += qty;

                        mapa[tp].importado += qty;
                      });
                      console.debug('[mostrarPedido-logapi] tiposPedido mapa', mapa, 'totalCount=', totalCount);
                      setTiposPedido(Object.values(mapa));
                      setMsg('Pedido ' + pedidoIdent + ' carregado a partir do log. Tipos: ' + Object.keys(mapa).length + ' / Total selos: ' + totalCount);
                    } catch(e){ console.debug('[mostrarPedido-logapi] erro ao calcular tiposPedido', e); setTiposPedido(null); }
                }
                setMsg('Pedido ' + pedidoIdent + ' carregado.');
                return;
              }
            } catch (e) {
              // tentar próximo
            }
          }
          // fallback: se pedidoIdent for um id de log (numérico), tentar endpoint que retorna response_json
          try {
            const asNum = Number(pedidoIdent);
            if (!isNaN(asNum) && asNum > 0) {
              try {
                const { json } = await tryFetchJson('/maker/api/funarpen/selos/logapi?id_log=' + encodeURIComponent(asNum));
                console.debug('mostrarPedido logapi response', json);
                if (json) {
                  if (Array.isArray(json.selos)) {
                    setSelos(json.selos);
                    try {
                      const mapa = {};
                      json.selos.forEach(function(s){
                        const raw = String(s.tiposelo_sel || s.tipo || '').toUpperCase() || '';
                        const tp = raw || 'OUTRO';
                        const qty = Number(s.qtde_carregada || s.qtde || s.qtd || 1) || 0;

                      });
                      setTiposPedido(Object.values(mapa));
                    } catch(e){ setTiposPedido(null); }
                  } else if (json.selos && Array.isArray(json.selos)) {
                    setSelos(json.selos);
                    setTiposPedido(null);
                  } else if (json.raw && json.raw.selos) {
                    setSelos(json.raw.selos);
                    try {
                      const mapa = {};
                      let totalCount = 0;
                      json.raw.selos.forEach(function(s){
                        const raw = String(s.tiposelo_sel || s.tipo || s.tiposelo || '').toUpperCase() || '';
                        const tp = mapTipoLabel(raw);
                        const qty = Number(s.qtde_carregada || s.qtde || s.qtd || 1) || 0;
                        totalCount += qty;
                        if (!mapa[tp]) mapa[tp] = { tipo: tp, pedido: s.pedido_sel || s.pedido || pedidoIdent || '-', importado: 0 };

                  }
                  setMsg('Pedido ' + pedidoIdent + ' carregado a partir do log.');
                  return;
                }
              } catch (e) { /* ignore */ }
            }
          } catch(e){}
          try {
            // 1) tentar extrair selos do array `logs` retornado pelo monitor (campo json_pedido)
            try {
              const collected = [];
              (logs || []).forEach(function(l){
                try {
                  // comparar pedido id com vários campos possíveis
                  const lid = String(l.pedido_sel || l.pedidoId || l.pedidoId || l.ID_LOG || l.id || '').trim();
                  if (!lid) return;
                  if (String(pedidoIdent) !== String(lid) && String(pedidoIdent) !== String(l.pedidoId)) return;
                  if (!l.json_pedido) return;
                  let parsed = null;
                  try { parsed = (typeof l.json_pedido === 'string') ? JSON.parse(l.json_pedido) : l.json_pedido; } catch(e) { parsed = null; }
                  if (!parsed) return;
                  // caso 1: parsed.selos é array
                  if (Array.isArray(parsed.selos) && parsed.selos.length > 0) {
                    parsed.selos.forEach(s => collected.push(s));
                  }
                  // caso 2: parsed.pedidos => cada pedido pode ter selos
                  if (Array.isArray(parsed.pedidos) && parsed.pedidos.length > 0) {
                    parsed.pedidos.forEach(function(p){
                      if (p && Array.isArray(p.selos)) p.selos.forEach(s => collected.push(s));
                      // compat: p.seloss (typos) or p.items
                      if (p && Array.isArray(p.seloss)) p.seloss.forEach(s => collected.push(s));
                    });
                  }
                } catch(e) { /* ignore per-log errors */ }
              });
              if (collected.length > 0) {
                console.debug('mostrarPedido extracted from logs json_pedido, count=', collected.length);
                setSelos(collected);
                // calcular tiposPedido a partir de collected
                try {
                  const mapa = {};
                  let totalCount = 0;
                  collected.forEach(function(s){
                    const raw = String(s.tiposelo_sel || s.tipo || s.tiposelo || '').toUpperCase() || '';
                    const tp = mapTipoLabel(raw);
                    const qty = Number(s.qtde_carregada || s.qtde || s.qtd || 1) || 0;
                    totalCount += qty;
                    if (!mapa[tp]) mapa[tp] = { tipo: tp, pedido: s.pedido_sel || s.pedido || pedidoIdent || '-', importado: 0 };
                    mapa[tp].importado += qty;
                  });
                  setTiposPedido(Object.values(mapa));
                  setMsg('Pedido ' + pedidoIdent + ' carregado a partir do log (json_pedido). Tipos: ' + Object.keys(mapa).length + ' / Total selos: ' + totalCount);
                  return;
                } catch(e){ console.debug('mostrarPedido error calculating tipos from logs', e); }
              }
            } catch(e) { console.debug('mostrarPedido logs extraction error', e); }

            // 2) fallback: filtrar selos já carregados em memória
            const filtered = (selos || []).filter(s => String(s.pedido_sel || s.pedido || s.pedidoId || s.ID_PEDIDO) === String(pedidoIdent));
            console.debug('mostrarPedido local filter found', filtered && filtered.length ? filtered.length : 0);
            if (filtered.length > 0) {
              setSelos(filtered);
              setMsg('Pedido ' + pedidoIdent + ' filtrado localmente.');
            } else {
              setMsg('Nenhum selo encontrado para o pedido ' + pedidoIdent + '.');
            }
          } catch (err) {
            setMsg('Erro ao carregar pedido: ' + (err && err.message ? err.message : String(err)));
          }
        }

            return;

          icon.innerHTML = type === 'success' ? '✔' : (type === 'error' ? '✖' : 'ℹ');
          icon.style.marginRight = '6px';
          icon.style.fontSize = '14px';
          el.appendChild(icon);

          const span = document.createElement('div');
          span.style.flex = '1';
          span.textContent = text;
          el.appendChild(span);

          const close = document.createElement('button');
          close.innerHTML = '×';
          close.style.cssText = 'border:none;background:transparent;color:rgba(255,255,255,0.95);font-size:16px;cursor:pointer;margin-left:8px;padding:0';
          close.onclick = function(){ try{ el.remove(); }catch(e){} };
          el.appendChild(close);

          if (type === 'success') el.style.background = '#28a745';
          else if (type === 'error') el.style.background = '#d9534f';
          else el.style.background = '#007bff';

          // newest on top
          container.prepend(el);

          // limit visible to 4
          while (container.children.length > 4) container.removeChild(container.lastChild);

          // auto dismiss with fade
          setTimeout(function(){ try{ el.style.transition = 'opacity 300ms, transform 300ms'; el.style.opacity = '0'; el.style.transform = 'translateY(6px)'; setTimeout(function(){ try{ el.remove(); }catch(e){} },300); }catch(e){} }, timeout);
        } catch (e) { console.warn('showToast failed', e); }
      }
