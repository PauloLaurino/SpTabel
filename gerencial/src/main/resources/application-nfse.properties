# ========================================
# Configuracao NFS-e ABRASF - Padrao Nacional
# ========================================

# Endpoint do WebService (padrao SP - substituir conforme municipio)
nfse.abrasf.endpoint=https://nfe.prefeitura.sp.gov.br/ws/lotenfe.asmx
# nfse.abrasf.endpoint=https://nfse.guarulhos.sp.gov.br/ws/nfse.asmx
# nfse.abrasf.endpoint=https://isscuritiba.curitiba.pr.gov.br/iss/nfse

# Credenciais da empresa
nfse.abrasf.cnpj-empresa=00000000000000
nfse.abrasf.inscricao-municipal=0000000
nfse.abrasf.usuario=usuario
nfse.abrasf.senha=senha

# Timeout de conexao (ms)
nfse.abrasf.tempo-timeout=60000

# Tipo de certificado digital (A1, A3)
nfse.abrasf.certificado-tipo=A1
nfse.abrasf.certificado-caminho=/path/to/certificado.pfx
nfse.abrasf.certificado-senha=senha_certificado

# Configuracao de ambiente
nfse.abrasf.ambiente=2  # 1=producao, 2=homologacao

# Configuracao de emissao
nfse.abrasf.serie-rps=001
nfse.abrasf.tipo-rps=1  # 1=RPS, 2=NFS-e, 3=Recibo
nfse.abrasf.natureza-operacao=1

# Codigos de municipio IBGE (ex: SP=3550308, Guarulhos=3518800, Curitiba=4314900)
nfse.abrasf.codigo-municipio=3550308

# Configuracao de retry
nfse.abrasf.retry.max=3
nfse.abrasf.retry.intervalo=1000

# Configuracao de logging
nfse.abrasf.log.xml=false  # Log dosXML de request/response
nfse.abrasf.log.soap=false  # Log detalhado SOAP