# ========================================
# Chat WhatsApp - Sistema de Protesto
# Configuração da Aplicação
# ========================================

spring:
  application:
    name: chat-whatsapp
  
  # Configuração do DataSource com HikariCP
  datasource:
    url: jdbc:mariadb://localhost:3306/spprot?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:k15720}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: ChatHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  
  # Configuração JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.MariaDBDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 25
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  
  # Configuração de Upload
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB
  
  # Configuração Jackson JSON
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: America/Sao_Paulo
    date-format: yyyy-MM-dd HH:mm:ss
    default-property-inclusion: non_null
  
  # Configuração de Log
  output:
    ansi:
      enabled: always

# ========================================
# Configuração do Servidor
# ========================================
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /chat
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
  tomcat:
    max-threads: 200
    min-spare-threads: 10
    accept-count: 100
    max-connections: 10000

# ========================================
# Configuração JWT
# ========================================
jwt:
  secret: ${JWT_SECRET:seprocom-protesto-chat-secret-key-2024-muito-segura-e-longa}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  header: Authorization
  prefix: Bearer

# ========================================
# Configuração do Chat
# ========================================
chat:
  # Socket.io Server (existente)
  socketio:
    server-url: ${SOCKETIO_URL:http://192.168.10.30:3001}
    namespace: /chat
  
  # Upload de arquivos
  upload:
    path: ${UPLOAD_PATH:/root/Servidor/uploads}
    max-size: 52428800
    allowed-types: pdf,jpg,jpeg,png,gif,mp3,mp4,ogg,webm
  
  # WhatsApp API
  whatsapp:
    server-url: ${WPP_SERVER:https://code.result.inf.br}
    api-key: ${WPP_API_KEY:}
    webhook-url: ${WPP_WEBHOOK:http://api.wtsapi.com.br:5000/webrun/Webhook.rule?sys=WPP}
  
  # Intimações/Boletos
  intimacao:
    pdf-path: ${INTIMACAO_PDF_PATH:/root/Servidor/intimacoes}
    template-path: ${INTIMACAO_TEMPLATE:classpath:templates/intimacao.pdf}

# ========================================
# Configuração de Logging
# ========================================
logging:
  level:
    root: INFO
    com.seprocom.protesto.chat: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_PATH:/var/log/chat}/chat.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 100MB

# ========================================
# Configuração Actuator (Health Check)
# ========================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

# ========================================
# Configuração Swagger/OpenAPI
# ========================================
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  info:
    title: Chat WhatsApp - API
    description: API de atendimento via chat para devedores do Sistema de Protesto
    version: 1.0.0
    contact:
      name: Seprocom
      email: suporte@seprocom.com.br

# ========================================
# Perfil de Desenvolvimento
# ========================================
---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.seprocom.protesto.chat: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

server:
  port: 8080

# ========================================
# Perfil de Produção
# ========================================
---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
    com.seprocom.protesto.chat: INFO

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: false

# ========================================
# Configuração NFSe - Padrão Nacional (ABRASF 2.03)
# ========================================
nfse:
  # WebService da prefeitura
  webservice:
    # URL do WebService (a ser configurada para cada município)
    url: ${NFSE_WS_URL:https://nfseabrasf.homologacao.ws.gov.br}
    # URL de produção
    url-producao: ${NFSE_WS_URL_PROD:https://nfseabrasf.gov.br}
    
    # CNPJ do prestador (empresa que emite)
    cnpj-prestador: ${NFSE_CNPJ:}
    
    # Inscrição Municipal do prestador
    inscricao-municipal: ${NFSE_INSCRICAO_MUNICIPAL:}
    
    # Código do município no IBGE
    municipio-ibge: ${NFSE_MUNICIPIO_IBGE:}
    
    # Código do serviço padrão (LC 116)
    codigo-servico-padrao: ${NFSE_CODIGO_SERVICO:}
    
    # Timeout de conexão (ms)
    connection-timeout: 30000
    
    # Timeout de leitura (ms)
    read-timeout: 60000
  
  # Certificado digital
  certificado:
    path: ${NFSE_CERT_PATH:}
    password: ${NFSE_CERT_PASSWORD:}
    tipo: ${NFSE_CERT_TIPO:JKS}
  
  # Configurações de emissão
  emissao:
    # Ambiente: 1=Homologação, 2=Produção
    ambiente: ${NFSE_AMBIENTE:1}
    
    # Série do RPS
    serie-rps: ${NFSE_SERIE_RPS:001}
    
    # Tipo de RPS: 1=RPS, 2=RPS-M, 3=RPS-SW
    tipo-rps: ${NFSE_TIPO_RPS:1}
    
    # Alíquota ISS padrão
    aliquota-iss-padrao: ${NFSE_ALIQUOTA_ISS:5.00}
