    <script type="text/javascript">
      const showMessageAsLegacy = false;
    </script>
    <script type="text/javascript">
      let jsonMessage;
      function systemOnLoadAction() {
        if (mainsystem.sysOnLoad) {
          mainsystem.sysOnLoad();
        }
        systemConnectWebsocket();

        // Carrega parâmetros do sistema para window.PARAMETROS (necessário para chat WhatZ)
        (function () {
          try {
            // Detectar contexto atual baseado no pathname
            var pathParts = window.location.pathname.split('/').filter(Boolean);
            var contexto = '';
            if (pathParts.length > 0 && pathParts[0]) {
              contexto = '/' + pathParts[0];
            }
            console.log('[Menu] Contexto detectado:', contexto);

            // URLs para tentar (com contexto e sem contexto como fallback)
            var urlsToTry = [];
            if (contexto) {
              urlsToTry.push(contexto + '/maker/api/parametros');
            }
            urlsToTry.push('/maker/api/parametros');

            var attemptIndex = 0;
            function tryNextUrl() {
              if (attemptIndex >= urlsToTry.length) {
                console.error('[Menu] Todas as tentativas de API falharam');
                return;
              }
              var apiUrl = urlsToTry[attemptIndex];
              attemptIndex++;
              console.log('[Menu] Tentando API:', apiUrl);

              fetch(apiUrl).then(function (r) {
                if (r.ok) return r.json();
                throw new Error('API retornou status ' + r.status);
              }).then(function (data) {
                console.log('[Menu] Parâmetros carregados:', data);
                window.PARAMETROS = data;
                window.parametros = data;

                function normalizeWhatz(value) {
                  return String(value == null ? '' : value).trim().toUpperCase();
                }

                function resolveWhatzFlag(payload) {
                  if (!payload || typeof payload !== 'object') return '';
                  return normalizeWhatz(
                    payload.WHATZ_PAR || payload.WHATZ || payload.whatz_par || payload.whatz ||
                    (payload.PARAMETROS && (payload.PARAMETROS.WHATZ_PAR || payload.PARAMETROS.WHATZ || payload.PARAMETROS.whatz_par || payload.PARAMETROS.whatz)) ||
                    (payload.parametros && (payload.parametros.WHATZ_PAR || payload.parametros.WHATZ || payload.parametros.whatz_par || payload.parametros.whatz))
                  );
                }

                function injectChatInto(targetWindow) {
                  try {
                    if (!targetWindow || !targetWindow.document) return false;
                    var doc = targetWindow.document;
                    if (doc.getElementById('menu-chat-widget-script')) {
                      return true;
                    }
                    var script = doc.createElement('script');
                    script.id = 'menu-chat-widget-script';
                    script.src = '/gerencial/chat/chat-widget.js';
                    script.async = true;
                    script.onload = function () {
                      try {
                        if (targetWindow.ChatWidget && typeof targetWindow.ChatWidget.init === 'function') {
                          targetWindow.ChatWidget.init({
                            chatUrl: '/gerencial/chat/',
                            primaryColor: '#25D366',
                            secondaryColor: '#128C7E',
                            width: 380,
                            height: 600,
                            showBadge: true,
                            zIndex: 99999
                          });
                          console.log('[Menu] Chat widget inicializado no target');
                        }
                      } catch (e) {
                        console.error('[Menu] Erro ao inicializar ChatWidget no target', e);
                      }
                    };
                    script.onerror = function (e) {
                      console.error('[Menu] Erro ao carregar chat-widget.js no target', e);
                    };
                    (doc.head || doc.documentElement).appendChild(script);
                    return true;
                  } catch (e) {
                    console.warn('[Menu] Não foi possível injetar chat no target', e);
                    return false;
                  }
                }

                function ensureChatInWorkspace() {
                  var tries = 0;
                  var maxTries = 25; // ~10s
                  var iv = setInterval(function () {
                    tries++;
                    try {
                      var frame = window.frames && window.frames.mainsystem;
                      var ok = injectChatInto(frame && frame.window ? frame.window : frame);
                      if (ok || tries >= maxTries) {
                        clearInterval(iv);
                      }
                    } catch (e) {
                      if (tries >= maxTries) clearInterval(iv);
                    }
                  }, 400);
                }

                // Após carregar os parâmetros, verificar se deve carregar o chat
                var whatzValue = resolveWhatzFlag(data);
                if (whatzValue === 'S') {
                  console.log('[Menu] WHATZ_PAR = S, carregando chat widget no menu e no workspace');
                  injectChatInto(window);
                  ensureChatInWorkspace();
                }
              }).catch(function (e) {
                console.warn('[Menu] Erro ao carregar parâmetros:', e);
                // Tentar próxima URL
                tryNextUrl();
              });

              // Iniciar tentativas
              tryNextUrl();
            }catch (e) { console.error('[Menu] Erro ao carregar parâmetros:', e); }
          }) ();

          // Carrega e chama `sprGraficoEstoque` de forma robusta: injeta o asset
          // se necessário e tenta chamar com retry, aguardando outras rules.
          (function () {
            function getAppRoot() {
              var parts = window.location.pathname.split('/').filter(Boolean);
              return parts.length ? '/' + parts[0] : '';
            }
            function getAssetCandidates(relativePath) {
              var root = getAppRoot();
              return [root + relativePath, '/notas' + relativePath, '/gerencial' + relativePath, relativePath].map(function (p) {
                return p.replace(/\/+/g, '/');
              });
            }
            function loadScriptCandidates(candidates, onLoaded) {
              if (!candidates.length) return onLoaded();
              var candidate = candidates.shift();
              if (!candidate) return loadScriptCandidates(candidates, onLoaded);
              if (document.querySelector('script[data-src="' + candidate + '"]')) {
                return onLoaded();
              }
              var s = document.createElement('script');
              s.setAttribute('data-src', candidate);
              s.src = candidate;
              s.async = true;
              s.onload = onLoaded;
              s.onerror = function () {
                loadScriptCandidates(candidates, onLoaded);
              };
              document.head.appendChild(s);
            }
            try {
              var candidates = getAssetCandidates('/assets/js/sprGraficoEstoque.js');
              loadScriptCandidates(candidates, function () {
                function tryCall(attempt) {
                  try {
                    if (typeof window.sprGraficoEstoque === 'function') {
                      try { window.sprGraficoEstoque(); } catch (e) { console.error(e); }
                      return;
                    }
                  } catch (e) { console.error(e); }
                  if (attempt < 20) {
                    setTimeout(function () { tryCall(attempt + 1); }, 200);
                  }
                }
                setTimeout(function () { tryCall(0); }, 300);
              });
            } catch (e) { console.error(e); }
          })();
        }

        var unloaded = false;

        function systemConnectWebsocket(reconnect) {
          window.webrunSocket = new WebSocket(getEndpointWS());

          window.webrunSocket.onopen = (event) => {
            let sendMessage = {};
            sendMessage.sysCode = "NOTAS";
            sendMessage.sessionID = "2E6FB9553D0B6BADD92505AE59A355F1";
            if (reconnect) sendMessage.userId = jsonMessage.userId;
            window.webrunSocket.send(JSON.stringify(sendMessage));

          window.webrunSocket.onerror = (err) => {

        window.addEventListener('online', (event) => {

          setTimeout(remainSession, 1800000);

    <script>
      // Carrega permanentemente o bridge que ajusta iframes abertos pelo menu
      (function () {
        try {
          // usar caminho relativo para evitar problemas com CSP/redirects/proxy
          var bridgePath = '/notas/html/frame-resize.js';
          console.log('frame-resize loader ->', bridgePath);
          function injectBridge(path) {
            try {
              var s = document.createElement('script');
              s.src = path;
              s.async = false;
              s.onload = function () {
                console.log('frame-resize.js injected fallback loaded');
              };
              s.onerror = function (e) {
                console.warn('fallback injection failed for frame-resize.js', e);
              };
              (document.head || document.documentElement).appendChild(s);
              return true;
            } catch (e) {
              console.warn('injectBridge failed', e);
              return false;
            }
          }

          if (typeof ebfIframeTransporter === 'function') {
            try {
              ebfIframeTransporter(bridgePath);
              console.log('ebfIframeTransporter called');
              // se transporter não expor bridge depois de curto tempo, injetar como fallback
              setTimeout(function () {
                if (!window.WR_FRAME_BRIDGE && !window.__WR_FRAME_BRIDGE__)
                  injectBridge(bridgePath);
              }, 800);
            } catch (e) {
              console.warn('ebfIframeTransporter call failed', e);
              injectBridge(bridgePath);
            }
          } else {
            window.addEventListener('load', function () {
              try {
                if (typeof ebfIframeTransporter === 'function') {
                  ebfIframeTransporter(bridgePath);
                  console.log('ebfIframeTransporter called on load');
                  setTimeout(function () {
                    if (!window.WR_FRAME_BRIDGE && !window.__WR_FRAME_BRIDGE__)
                      injectBridge(bridgePath);
                  }, 800);
                  return;
                }
              } catch (e) {
                console.warn('ebfIframeTransporter not available on load', e);
              }
              // fallback direto
              injectBridge(bridgePath);
            });
            // tentativa imediata também
            injectBridge(bridgePath);
          }
        } catch (e) {
          console.warn('Erro ao carregar frame-resize bridge', e);
        }
      })();

    <style>

    <script>
      // Inject small horizontal bar chart into sidebar Menu
      (function () {
        function initSidebarChart() {
          try {
            var menu = document.getElementById('Menu');
            if (!menu) return;
            // avoid duplicate
            if (document.getElementById('fp-sidebar-chart')) return;
            var container = document.createElement('div');
            container.id = 'fp-sidebar-chart';
            container.className = 'fp-sidebar-chart';
            container.innerHTML =
              '<div style="font-weight:700;margin-bottom:6px;color:#111">Estoque de Selos</div><div id="fp-sidebar-chart-rows">Carregando...</div><div id="fp-sidebar-cert" class="fp-sidebar-cert"><div style="font-weight:700;margin:8px 0 6px;color:#111">Certificado</div><div id="fp-sidebar-cert-status">Aguardando validação...</div></div>';
            // append at end of menu inner container
            var inner = menu.querySelector('.menu-inner-container');
            if (inner) inner.appendChild(container);
            else menu.appendChild(container);

            // fetch counts and limits using the current application context path
            function fetchAny(path) {
              var pathParts = window.location.pathname.split('/').filter(Boolean);
              var contextPath = pathParts.length ? '/' + pathParts[0] : '';
              var prefixes = [contextPath, '/notas', '/gerencial', '/funarpen', ''];
              var attempts = prefixes.map(function (p) {
                return (p + path).replace(/\/+/g, '/');
              });
              var tryFetch = function (i) {
                if (i >= attempts.length) return Promise.resolve({});
                return fetch(attempts[i])
                  .then(function (r) {
                    return r.ok ? r.json() : Promise.reject();
                  })
                  .catch(function () {
                    return tryFetch(i + 1);
                  });
              };
              return tryFetch(0);
            }

            Promise.all([
              fetchAny('/maker/api/notas/selos/cards/estoque'),
              fetchAny('/maker/api/notas/selos/cards/tipoLimites'),
            ])
              .then(function (vals) {
                var estoque = vals[0] && vals[0].estoque ? vals[0].estoque : {};
                var limits = vals[1] && vals[1].tipoLimites ? vals[1].tipoLimites : {};
                renderRows(estoque, limits);
                fetchAny('/maker/api/notas/certificado')
                  .then(renderCertificateStatus)
                  .catch(function () {
                    renderCertificateStatus(null);
                  });
              })
              .catch(function () {
                renderRows({}, {});
                renderCertificateStatus(null);
              });
          } catch (e) {
            console.error('fp-sidebar-chart init error', e);
          }
        }

        function renderRows(estoque, limits) {
          var rows = document.getElementById('fp-sidebar-chart-rows');
          if (!rows) return;
          rows.innerHTML = '';
          var keys = Object.keys(estoque);
          if (keys.length === 0) {
            rows.innerText = 'Sem dados de estoque';
            return;
          }
          keys.forEach(function (k) {
            try {
              var qtd = Number(estoque[k] || 0);
              var limite = Number(limits[k] != null ? limits[k] : 0);
              var percent = limite > 0 ? Math.round((qtd / limite) * 100) : 0;
              var row = document.createElement('div');
              row.className = 'fp-chart-row';
              var label = document.createElement('div');
              label.className = 'fp-chart-label';
              label.title = k;
              label.innerText = k;
              var wrap = document.createElement('div');
              wrap.className = 'fp-chart-bar-wrap';
              var bar = document.createElement('div');
              bar.className = 'fp-chart-bar';
              // choose color: <70 green, 70-99 yellow, >=100 red
              var color = '#16a34a';
              if (percent >= 70 && percent < 100) color = '#f59e0b';
              if (percent >= 100) color = '#ef4444';
              bar.style.backgroundColor = color;
              // initial width 0, animate after insertion
              bar.style.width = '0%';
              wrap.appendChild(bar);
              var pct = document.createElement('div');
              pct.className = 'fp-chart-percent';
              pct.innerText = limite > 0 ? percent + '%' : qtd + '';
              row.appendChild(label);
              row.appendChild(wrap);
              row.appendChild(pct);
              rows.appendChild(row);
              // animate to target width (cap at 150% for visual overflow)
              setTimeout(function () {
                var w = limite > 0 ? Math.min(150, (qtd / limite) * 100) : 0;
                bar.style.width = w + '%';
              }, 50);
            } catch (e) {
              console.warn('fp-row render error', e);
            }
          });
        }

        function renderCertificateStatus(cert) {
          var target = document.getElementById('fp-sidebar-cert-status');
          if (!target) return;
          if (!cert) {
            target.innerText = 'Não foi possível verificar o certificado.';
            target.style.color = '#d97706';
            return;
          }
          if (cert.valid) {
            target.innerHTML =
              '<div style="font-weight:700;color:#16a34a">Válido</div>' +
              (cert.message
                ? '<div style="font-size:12px;color:#374151;margin-top:4px">' +
                  cert.message +
                  '</div>'
                : '') +
              (cert.notAfter
                ? '<div style="font-size:12px;color:#374151;margin-top:4px">Validade até: ' +
                  cert.notAfter +
                  '</div>'
                : '') +
              (typeof cert.daysToExpire === 'number'
                ? '<div style="font-size:12px;color:#374151;margin-top:4px">Expira em ' +
                  cert.daysToExpire +
                  ' dias</div>'
                : '');
          } else {
            target.innerHTML =
              '<div style="font-weight:700;color:#ef4444">Inválido</div>' +
              (cert.message
                ? '<div style="font-size:12px;color:#374151;margin-top:4px">' +
                  cert.message +
                  '</div>'
                : '');
          }
        }

        // try to init after DOMContentLoaded and also after a short delay for dynamic menus
        if (document.readyState === 'complete' || document.readyState === 'interactive')
          setTimeout(initSidebarChart, 300);
        else
          document.addEventListener('DOMContentLoaded', function () {
            setTimeout(initSidebarChart, 300);
          });
        // also attempt to re-init when menu content may change
        setTimeout(function () {
          initSidebarChart();
        }, 1500);
      })();
    </script>
